<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צ'ק ליסט קשר</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-gray-100 p-4 pb-28">

    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-200">
        <!-- כותרת -->
        <div class="bg-slate-900 text-white p-6 text-center">
            <h1 class="text-xl font-bold">דף חפיפה בעמדה מבצעית</h1>
            <p class="text-xs opacity-70 italic">מפקדים - רחפניסטים - עמדת קשר</p>
        </div>

        <!-- פרטי משימה -->
        <div class="p-4 bg-slate-50 border-b border-gray-200 space-y-3">
            <input type="text" id="missionName" placeholder="שם משימה..." class="w-full p-3 border rounded-xl shadow-sm outline-none focus:ring-2 focus:ring-blue-500">
            <div class="flex gap-2">
                <input type="date" id="missionDate" class="flex-1 p-3 border rounded-xl text-sm shadow-sm">
                <input type="time" id="missionTime" class="w-28 p-3 border rounded-xl text-sm text-center shadow-sm">
            </div>
        </div>

        <!-- סעיפים -->
        <div class="p-4">
            <h2 class="text-lg font-bold text-slate-800 mb-4 border-r-4 border-blue-600 pr-2">ציר קשר ותקשורת (קשר לקשר)</h2>
            <div id="list" class="space-y-2"></div>
        </div>

        <!-- הערות -->
        <div class="px-4 mb-4">
            <label class="text-xs font-bold text-gray-500 mr-1">הערות נוספות:</label>
            <textarea id="notes" class="w-full h-24 p-3 border border-gray-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="הוסף הערות כאן..."></textarea>
        </div>

        <!-- חתימות -->
        <div class="p-4 bg-gray-50 border-t flex gap-2">
            <input type="text" id="out" placeholder="קשר יוצא" class="flex-1 p-2 border rounded-lg text-xs">
            <input type="text" id="in" placeholder="קשר נכנס" class="flex-1 p-2 border rounded-lg text-xs">
        </div>

        <div class="p-2 text-center text-[10px] text-gray-400 font-bold bg-slate-900">"תמיד תהי לי היחידה"</div>
    </div>

    <!-- כפתור וואטסאפ -->
    <div class="fixed bottom-6 left-0 right-0 px-4 max-w-md mx-auto">
        <button onclick="send()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-2xl flex items-center justify-center gap-2 hover:bg-green-700 transition-all active:scale-95">
            <span>שתף ב-WhatsApp</span>
        </button>
    </div>

    <script>
        const items = [
            "הטענות : תקינות מכשירי ההטענה הרלוונטיים",
            "תדרים : וידוא תדר גזרתי, תדר פלוגתי ותדר מנמרים",
            "אנטנות : תקינות כבלים, חיבורים ואנטנות חיצוניות",
            "אנרגיה : מלאי סוללות טעונות ספייר למכשירי קשר",
            "דף קשר : אוקים מעודכנים+פק\"לי צ",
            "שמיעה : ביצוע בדיקת קשר מול החמ\"ל הרלוונטי"
        ];

        let state = items.map((t, i) => ({ id: i, text: t, checked: false }));

        function render() {
            const container = document.getElementById('list');
            container.innerHTML = '';
            state.forEach(item => {
                const div = document.createElement('div');
                div.onclick = () => { item.checked = !item.checked; render(); };
                div.className = `flex items-center gap-3 p-4 rounded-xl border-2 cursor-pointer transition-all ${item.checked ? 'bg-blue-50 border-blue-400' : 'bg-white border-gray-100'}`;
                div.innerHTML = `<div class="w-6 h-6 rounded border-2 flex items-center justify-center ${item.checked ? 'bg-blue-600 border-blue-600 text-white' : 'border-gray-300'}">${item.checked ? '✓' : ''}</div><span class="text-sm ${item.checked ? 'font-bold text-blue-900' : 'text-gray-700'}">${item.text}</span>`;
                container.appendChild(div);
            });
        }

        function send() {
            const msg = `*צ'ק ליסט קשר*\nמשימה: ${document.getElementById('missionName').value}\nתאריך: ${document.getElementById('missionDate').value}\nשעה: ${document.getElementById('missionTime').value}\n\n` + 
                        state.map(i => `${i.checked ? '✅' : '❌'} ${i.text}`).join('\n') + 
                        `\n\n*הערות:* ${document.getElementById('notes').value}\n*יוצא:* ${document.getElementById('out').value}\n*נכנס:* ${document.getElementById('in').value}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        document.getElementById('missionDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('missionTime').value = new Date().toTimeString().slice(0,5);
        render();
    </script>
</body>
</html>
