<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חפיפה מבצעית - Rambo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Assistant', sans-serif;
            background-color: #020617;
            color: #e2e8f0;
            margin: 0;
            overflow-x: hidden;
        }

        .tactical-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(2, 6, 23, 0.9), rgba(2, 6, 23, 0.9)),
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            z-index: -1;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
        }

        .mil-input {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(71, 85, 105, 0.4);
            color: #fff;
            appearance: none;
        }

        .mil-input:focus {
            border-color: #3b82f6;
            background: rgba(30, 41, 59, 0.8);
            outline: none;
        }

        .scanner-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(59, 130, 246, 0.3);
            top: 0;
            animation: scan 5s linear infinite;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .custom-checkbox {
            width: 26px;
            height: 26px;
            border: 2px solid #475569;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .checked .custom-checkbox {
            background-color: #2563eb;
            border-color: #2563eb;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="tactical-bg"></div>

    <div class="max-w-xl mx-auto relative">
        
        <!-- Header Section -->
        <div class="flex flex-col items-center mb-6">
            <div class="flex justify-between w-full items-center">
                <!-- Right Side Spacer -->
                <div class="w-20"></div>
                
                <div class="text-center">
                    <h2 class="text-blue-500 font-black text-2xl tracking-[0.1em]">הפלוגה הייעודית</h2>
                    <p class="text-white text-lg font-black tracking-widest mt-1 italic">RAMBO</p>
                </div>

                <!-- Unit Symbol on Left -->
                <div class="w-24 h-24 flex items-center justify-center">
                    <img src="https://upload.wikimedia.org/wikipedia/he/3/36/414_Logo.png" alt="סמל יחידה" class="max-h-full drop-shadow-[0_0_10px_rgba(59,130,246,0.5)]">
                </div>
            </div>
        </div>

        <div class="glass-card rounded-3xl overflow-hidden relative">
            <div class="scanner-line"></div>
            
            <div class="bg-blue-950/50 p-6 border-b border-blue-500/20 text-center">
                <h1 class="text-xl font-black text-white uppercase tracking-tight">חפיפה מבצעית - עמדת קשר</h1>
            </div>

            <!-- Inputs Container -->
            <div class="p-6 space-y-5 border-b border-white/5">
                <!-- Mission Name -->
                <div>
                    <label class="text-[10px] font-bold text-blue-400 block mb-1.5 px-1 uppercase tracking-wider">שם משימה / אירוע</label>
                    <input type="text" id="missionName" class="mil-input w-full p-4 rounded-xl font-bold" placeholder="הקלד נתוני משימה...">
                </div>

                <!-- Date & Time Row - Increased Gap -->
                <div class="flex flex-row gap-6">
                    <div class="flex-1">
                        <label class="text-[10px] font-bold text-blue-400 block mb-1.5 px-1 uppercase tracking-wider">תאריך</label>
                        <input type="date" id="missionDate" class="mil-input w-full p-3 rounded-xl text-sm">
                    </div>
                    <div class="w-1/3 min-w-[100px]">
                        <label class="text-[10px] font-bold text-blue-400 block mb-1.5 px-1 uppercase tracking-wider">שעה</label>
                        <input type="time" id="missionTime" class="mil-input w-full p-3 rounded-xl text-sm text-center">
                    </div>
                </div>
            </div>

            <!-- Checklist Section -->
            <div class="p-6">
                <h3 class="text-md font-bold text-white mb-5 flex items-center gap-3">
                    <span class="w-2.5 h-2.5 bg-blue-500 rounded-full animate-pulse shadow-[0_0_8px_#3b82f6]"></span>
                    בדיקות ציר קשר ותקשורת
                </h3>
                <div id="itemsList" class="space-y-3">
                    <!-- Loaded via JavaScript -->
                </div>
            </div>

            <!-- Notes -->
            <div class="px-6 pb-6">
                <label class="text-[10px] font-bold text-blue-400 block mb-2 px-1 uppercase tracking-wider">דגשים וחריגים:</label>
                <textarea id="notes" class="mil-input w-full h-32 p-4 rounded-2xl text-sm outline-none resize-none" placeholder="פרט דגשים רלוונטיים..."></textarea>
            </div>

            <!-- Signatures Section -->
            <div class="p-5 bg-black/40 flex flex-row gap-4 border-t border-white/10">
                <div class="flex-1">
                    <label class="text-[10px] font-bold text-slate-500 block mb-1 px-1">קשר יוצא</label>
                    <input type="text" id="outSign" class="mil-input w-full p-3 rounded-xl text-xs" placeholder="שם מלא">
                </div>
                <div class="flex-1">
                    <label class="text-[10px] font-bold text-slate-500 block mb-1 px-1">קשר נכנס</label>
                    <input type="text" id="inSign" class="mil-input w-full p-3 rounded-xl text-xs" placeholder="שם מלא">
                </div>
            </div>
        </div>

        <!-- System Status Display -->
        <div class="mt-8 mb-32 px-2">
            <div class="flex justify-between items-center mb-2.5">
                <span class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em]">Operational Status</span>
                <span id="pctText" class="text-2xl font-black text-white italic">0%</span>
            </div>
            <div class="w-full h-3 bg-slate-900 rounded-full border border-white/10 p-0.5">
                <div id="pctBar" class="h-full bg-gradient-to-l from-blue-700 to-blue-400 rounded-full transition-all duration-700 ease-out shadow-[0_0_15px_rgba(59,130,246,0.4)]" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <!-- Fixed Action Button -->
    <div class="fixed bottom-6 left-0 right-0 px-6 max-w-xl mx-auto z-50">
        <button onclick="send()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl font-black shadow-[0_15px_40px_rgba(0,0,0,0.6),0_0_20px_rgba(37,99,235,0.3)] flex items-center justify-center gap-3 transition-all active:scale-95 border border-blue-400/20 uppercase tracking-widest">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.767 5.766 0 1.232.321 2.391.927 3.447l-1.174 4.301 4.391-1.153a5.728 5.728 0 002.623.637l.003-.001c3.181 0 5.767-2.586 5.767-5.766 0-3.18-2.586-5.766-5.77-5.766zm3.376 8.21c-.147.412-.751.751-1.047.807-.297.056-.677.084-1.107-.056-.264-.084-.587-.194-1.034-.383-1.89-.801-3.116-2.731-3.21-2.857-.095-.126-.771-.992-.771-1.986 0-.994.519-1.484.703-1.685.184-.201.405-.251.541-.251.135 0 .27 0 .387.006.12.006.279-.045.438.334.164.391.56 1.365.61 1.465.05.1.083.217.017.351-.066.134-.1.217-.2.334-.1.117-.211.263-.3.351-.1.1-.205.209-.089.409.116.2.514.851 1.103 1.375.758.675 1.397.883 1.597.983.2.1.317.084.436-.05.12-.134.514-.601.65-.802.135-.2.27-.167.456-.1.186.067 1.177.556 1.38.658.202.102.337.151.386.234.05.084.05.483-.1.895z"/></svg>
            שדר דיווח RAMBO
        </button>
    </div>

    <script>
        const tasks = [
            "הטענות : תקינות מכשירי ההטענה הרלוונטיים",
            "תדרים : וידוא תדר גזרתי, תדר פלוגתי ותדר מנמרים",
            "אנטנות : תקינות כבלים, חיבורים ואנטנות חיצוניות",
            "אנרגיה : מלאי סוללות טעונות ספייר למכשירי קשר",
            "דף קשר : אוקים מעודכנים+פק\"לי צ",
            "שמיעה : ביצוע בדיקת קשר מול החמ\"ל הרלוונטי"
        ];

        let state = tasks.map((t, i) => ({ id: i, text: t, checked: false }));

        function init() {
            const now = new Date();
            document.getElementById('missionDate').value = now.toISOString().split('T')[0];
            document.getElementById('missionTime').value = now.toTimeString().slice(0,5);
            render();
        }

        function render() {
            const list = document.getElementById('itemsList');
            list.innerHTML = '';
            
            state.forEach(item => {
                const row = document.createElement('div');
                row.onclick = () => { item.checked = !item.checked; render(); };
                row.className = `flex items-center gap-4 p-4 rounded-xl border transition-all cursor-pointer select-none ${
                    item.checked 
                    ? 'bg-blue-600/20 border-blue-500 shadow-inner' 
                    : 'bg-white/5 border-white/5 hover:bg-white/10 hover:border-white/20'
                }`;
                
                row.innerHTML = `
                    <div class="custom-checkbox ${item.checked ? 'checked' : ''}">
                        ${item.checked ? '<span class="text-white font-bold">✓</span>' : ''}
                    </div>
                    <span class="text-[15px] ${item.checked ? 'text-white font-bold' : 'text-slate-400'}">
                        ${item.text}
                    </span>
                `;
                list.appendChild(row);
            });

            const completed = state.filter(s => s.checked).length;
            const pct = Math.round((completed / state.length) * 100);
            document.getElementById('pctBar').style.width = pct + '%';
            document.getElementById('pctText').innerText = pct + '%';
        }

        function send() {
            const mission = document.getElementById('missionName').value || "לא צוין";
            const date = document.getElementById('missionDate').value;
            const time = document.getElementById('missionTime').value;
            const noteText = document.getElementById('notes').value || "אין";
            const uOut = document.getElementById('outSign').value || "לא צוין";
            const uIn = document.getElementById('inSign').value || "לא צוין";

            let summary = state.map(i => `${i.checked ? '✅' : '❌'} ${i.text}`).join('\n');
            
            const msg = `*--- דוח חפיפה מבצעי: RAMBO ---*\n` +
                        `📌 *משימה:* ${mission}\n` +
                        `⏰ *זמן:* ${date} | ${time}\n\n` +
                        `*סטטוס בדיקות קשר:*\n${summary}\n\n` +
                        `📝 *הערות:* ${noteText}\n\n` +
                        `👤 *קשר יוצא:* ${uOut}\n` +
                        `👤 *קשר נכנס:* ${uIn}\n\n` +
                        `_שודר ממערכת החפיפה הייעודית_`;

            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        init();
    </script>
</body>
</html>
